<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dagelijkse Mop</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef2f3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 { color: #333; line-height: 1.4; margin-bottom: 25px; }

        #answer {
            display: none;
            margin: 20px 0;
            font-weight: bold;
            font-size: 24px;
            color: #27ae60;
            animation: fadeIn 0.5s;
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }
        
        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 600;
        }

        .primary-btn { background: #000; color: #fff; }
        .fav-btn { background: #f1c40f; color: #000; }
        .next-btn { background: #ecf0f1; color: #333; font-size: 14px; }

        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .saved-section {
            margin-top: 30px;
            width: 100%;
            max-width: 450px;
        }

        .fav-item {
            background: #fff;
            margin-bottom: 10px;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #f1c40f;
            font-size: 14px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="card">
        <h2 id="question">Laden...</h2>
        <div id="answer"></div>

        <div class="controls">
            <button class="primary-btn" onclick="showAnswer()">💡 Toon Antwoord</button>
            <button class="fav-btn" onclick="saveToFavorites()">⭐ Sla mop op</button>
            <button class="next-btn" onclick="getNewJoke()">Andere mop proberen</button>
        </div>
    </div>

    <div class="saved-section">
        <h3 style="text-align: center;">Jouw Favorieten</h3>
        <div id="favoritesList"></div>
    </div>

<script>
    // Voeg hier je eigen moppen toe!
    const moppen = [
        { q: "Het is groen en het skiet van de berg?", a: "Een ski-wi!" },
        { q: "Waarom nam de domme blondje een ladder mee naar de winkel?", a: "Omdat de prijzen zo hoog waren!" },
        { q: "Wat is geel en roept: 'Ik ben een appel'?", a: "Een banaan met een identiteitscrisis!" },
        { q: "Hoe noem je een konijn met een zonnebril?", a: "Een fel-be-haard!" },
        { q: "Wat is het toppunt van snelheid?", a: "Een slak die uit de bocht vliegt!" },
        { q: "Waarom kan een skelet niet goed liegen?", a: "Je kijkt er zo dwars doorheen!" },
        { q: "Het is blauw en niet zwaar?", a: "Lichtblauw!" }
    ];

    let currentJoke = {};

    function getNewJoke() {
        // Verberg antwoord van de vorige mop
        document.getElementById("answer").style.display = "none";
        
        // Kies een willekeurige mop
        const random = Math.floor(Math.random() * moppen.length);
        currentJoke = moppen[random];
        
        document.getElementById("question").innerText = currentJoke.q;
        document.getElementById("answer").innerText = currentJoke.a;
    }

    function showAnswer() {
        document.getElementById("answer").style.display = "block";
    }

    function saveToFavorites() {
        let saved = JSON.parse(localStorage.getItem("mijnMoppen")) || [];
        
        // Check of hij al opgeslagen is
        if (!saved.some(m => m.q === currentJoke.q)) {
            saved.push(currentJoke);
            localStorage.setItem("mijnMoppen", JSON.stringify(saved));
            displayFavorites();
            alert("Mop bewaard!");
        }
    }

    function displayFavorites() {
        const list = document.getElementById("favoritesList");
        const saved = JSON.parse(localStorage.getItem("mijnMoppen")) || [];
        
        if (saved.length === 0) {
            list.innerHTML = "<p style='text-align:center; color:#888;'>Nog geen favorieten.</p>";
            return;
        }

        list.innerHTML = saved.map(m => `
            <div class="fav-item">
                <strong>V: ${m.q}</strong><br>
                <span>A: ${m.a}</span>
            </div>
        `).reverse().join(""); // Nieuwste bovenaan
    }

    // DIT IS DE BELANGRIJKE STAP:
    // Zodra de pagina laadt (na de scan), wordt getNewJoke direct uitgevoerd.
    window.onload = () => {
        getNewJoke();
        displayFavorites();
    };
</script>

</body>
</html>
