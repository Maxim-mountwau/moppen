<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoppenTrommel NL</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 35px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            margin-top: 20px;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            display: none;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        h2 { color: #2c3e50; font-size: 22px; line-height: 1.5; }

        #answer {
            display: none;
            margin: 25px 0;
            font-weight: bold;
            font-size: 24px;
            color: #27ae60;
            padding: 15px;
            background: #f0fff4;
            border-radius: 10px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }

        button {
            padding: 16px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .primary-btn { background: #000; color: #fff; }
        .star-btn { background: #ffcc00; color: #000; }
        .refresh-btn { background: #eee; color: #555; }

        button:active { transform: scale(0.98); }

        .saved-list {
            margin-top: 40px;
            width: 100%;
            max-width: 450px;
        }

        .fav-card {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 6px solid #ffcc00;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div class="card">
        <div id="loader" class="loader"></div>
        <h2 id="joke-q">Laden van een verse mop...</h2>
        <div id="answer"></div>

        <div class="btn-container">
            <button class="primary-btn" onclick="showAnswer()">💡 Toon Antwoord</button>
            <button class="star-btn" onclick="saveMop()">⭐ Bewaar Mop</button>
            <button class="refresh-btn" onclick="fetchNewJoke()">Volgende Mop ➡️</button>
        </div>
    </div>

    <div class="saved-list">
        <h3 style="text-align: center; color: #7f8c8d;">⭐ Jouw Favorieten</h3>
        <div id="fav-container"></div>
    </div>

<script>
    let currentMop = { q: "", a: "" };

    async function fetchNewJoke() {
        const qElement = document.getElementById("joke-q");
        const aElement = document.getElementById("answer");
        const loader = document.getElementById("loader");

        // UI Reset
        aElement.style.display = "none";
        qElement.innerText = "Bezig met ophalen...";
        loader.style.display = "block";

        try {
            // We gebruiken een API die willekeurige NL moppen serveert
            const response = await fetch('https://moppen-api.vercel.app/api/random');
            const data = await response.json();

            currentMop.q = data.setup;
            currentMop.a = data.punchline;

            qElement.innerText = currentMop.q;
            aElement.innerText = currentMop.a;
        } catch (error) {
            qElement.innerText = "Oeps! De moppentrommel zit even op slot. Probeer het opnieuw.";
            console.error(error);
        } finally {
            loader.style.display = "none";
        }
    }

    function showAnswer() {
        document.getElementById("answer").style.display = "block";
    }

    function saveMop() {
        let favorites = JSON.parse(localStorage.getItem("moppenFavorieten")) || [];
        
        if (!favorites.some(m => m.q === currentMop.q)) {
            favorites.push({...currentMop});
            localStorage.setItem("moppenFavorieten", JSON.stringify(favorites));
            renderFavorites();
        }
    }

    function renderFavorites() {
        const container = document.getElementById("fav-container");
        const favorites = JSON.parse(localStorage.getItem("moppenFavorieten")) || [];
        
        if (favorites.length === 0) {
            container.innerHTML = "<p style='text-align:center; color:#999;'>Nog geen moppen opgeslagen.</p>";
            return;
        }

        container.innerHTML = favorites.map(m => `
            <div class="fav-card">
                <strong>${m.q}</strong><br>
                <span style="color: #27ae60;">${m.a}</span>
            </div>
        `).reverse().join("");
    }

    // Automatisch laden bij openen (scannen)
    window.onload = () => {
        fetchNewJoke();
        renderFavorites();
    };
</script>

</body>
</html>
