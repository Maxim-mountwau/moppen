<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mop</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
text-align:center;
max-width:500px;
}

button{
margin-top:20px;
padding:12px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:black;
color:white;
cursor:pointer;
}

#answer{
display:none;
margin-top:20px;
font-weight:bold;
font-size:20px;
}

</style>

</head>

<body>

<div class="card">

<h2 id="question">Nieuwe mop laden...</h2>

<button onclick="showAnswer()">Toon antwoord</button>

<div id="answer"></div>

<br>

<button onclick="getJoke()">Nieuwe mop</button>

</div>

<script>

async function getJoke(){

document.getElementById("answer").style.display="none"

const response = await fetch("https://v2.jokeapi.dev/joke/Any?safe-mode&type=twopart")

const data = await response.json()

document.getElementById("question").innerText = data.setup
document.getElementById("answer").innerText = data.delivery

}

function showAnswer(){
document.getElementById("answer").style.display="block"
}

getJoke()

</script>

</body>
</html>
