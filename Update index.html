    <title>MoppenTrommel Pro</title>
    <style>
        :root { --primary: #000; --accent: #ffcc00; --bg: #f4f7f6; }

        .card { background: white; padding: 35px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 450px; width: 100%; margin-top: 20px; }
        h2 { color: #2c3e50; font-size: 20px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        #answer { display: none; margin: 20px 0; font-weight: bold; font-size: 22px; color: #27ae60; padding: 15px; background: #f0fff4; border-radius: 12px; animation: pop 0.3s; }
        @keyframes pop { 0% { transform: scale(0.9); } 100% { transform: scale(1); } }
        .btn-container { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; font-size: 16px; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .primary-btn { background: var(--primary); color: #fff; }
        .star-btn { background: var(--accent); color: #000; }
        .refresh-btn { background: #eee; color: #555; }
        button:active { transform: scale(0.96); }
        .saved-list { margin-top: 30px; width: 100%; max-width: 450px; }
        .fav-card { background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 8px; border-left: 5px solid var(--accent); font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .counter { font-size: 12px; color: #999; margin-bottom: 10px; }
    </style>
</head>
